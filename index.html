<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just For You ❤️</title>
    
    <style>
        /* This styles the background and centers everything */
        body {
            background-color: #1a1a2e; /* A sleek, dark night-sky color */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        /* This is the CSS magic to draw a heart shape */
        .heart {
            position: relative;
            width: 100px;
            height: 100px;
            background-color: #e90052;
            transform: rotate(-45deg);
            animation: beat 1.2s infinite; /* Connects to the animation below */
            margin-bottom: 60px;
            box-shadow: 0 0 40px #e90052; /* Gives the heart a nice glow */
        }

        /* The rounded top parts of the heart */
        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #e90052;
            border-radius: 50%;
        }

        .heart::before {
            top: -50px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 50px;
        }

        /* This creates the beating animation effect */
        @keyframes beat {
            0% { transform: scale(1) rotate(-45deg); }
            20% { transform: scale(1.2) rotate(-45deg); }
            40% { transform: scale(1) rotate(-45deg); }
            60% { transform: scale(1.2) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }

        /* Styling for your message */
        h1 {
            color: white;
            font-size: 3.5rem;
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(233, 0, 82, 0.5);
        }

        p {
            color: #ffb3c6;
            font-size: 1.5rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="heart"></div>

    <h1>I love you, bby! ❤️</h1>
    <p>You mean the world to me.</p>

</body>
</html>
